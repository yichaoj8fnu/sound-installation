<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>音声装置 / 共演中</title>
  <style>
    body {
      margin: 0; padding: 0; height: 100vh; width: 100vw;
      font-family: "Helvetica Neue", sans-serif;
      overflow: hidden;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; text-align: center;
      transition: background-color 0.3s ease;
    }
    
    /* 初始蓝底状态 */
    body.step-join { background-color: #474AFF; color: #FFFFFF; }
    /* 播放时的初始粉底（随后由JS接管闪烁） */
    body.step-play { background-color: #FF007F; }

    button {
      border: none; border-radius: 0; cursor: pointer;
      font-weight: bold; transition: background-color 0.2s ease;
    }
    button:active { background-color: black !important; color: white !important; }

    /* JOIN 界面元素 */
    #page-join { display: flex; flex-direction: column; align-items: center; }
    .notice { font-size: 1rem; letter-spacing: 0.03em; line-height: 1.6; margin-bottom: 2rem; padding: 0 2rem; }
    #join-btn { background-color: #00FFFF; padding: 1rem 2.5rem; font-size: 1.2rem; color: black; }

    /* 共演中 界面元素 */
    #page-play { display: none; flex-direction: column; align-items: center; }
    #playing-text { color: white; font-size: 1.5rem; font-weight: bold; letter-spacing: 0.2em; }
  </style>
</head>
<body class="step-join">

  <div id="page-join">
    <p class="notice">
      サイレントモードをオフにし、音量を最大にしてください。<br />
      ページをリロードしないでください。<br />
      1人1トラックが割り当てられます。
    </p>
    <button id="join-btn">JOIN</button>
  </div>

  <div id="page-play">
    <div id="playing-text">共演中…</div>
  </div>

  <script type="module">
    import { startPlayback, setupBackgroundFlash } from './tone-player.js';

    const body = document.body;
    const pageJoin = document.getElementById('page-join');
    const pagePlay = document.getElementById('page-play');
    const joinBtn = document.getElementById('join-btn');

    // 核心优化：将 UI 切换与音频唤醒绑定在同一次点击中
    joinBtn.onclick = async () => {
      // 1. 瞬间切换 UI 视觉状态
      pageJoin.style.display = "none";
      pagePlay.style.display = "flex";
      body.classList.remove("step-join");
      body.classList.add("step-play");

      // 2. 利用这次极其宝贵的“点击权限”，直接启动声音装置
      await startPlayback();
      setupBackgroundFlash();
    };
  </script>
</body>
</html>
